name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-vulkan:
    name: clippy (vulkan)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Vulkan toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            vulkan-tools \
            glslang-dev \
            spirv-tools \
            libspirv-tools-dev
      - run: cargo clippy --workspace --features vulkan --all-targets

  build-vulkan:
    name: build (vulkan)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Vulkan toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            vulkan-tools \
            glslang-dev \
            spirv-tools \
            libspirv-tools-dev
      - run: cargo build --workspace --features vulkan

  doc:
    name: docs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Vulkan toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            glslang-dev \
            spirv-tools \
            libspirv-tools-dev
      - run: cargo doc --workspace --no-deps --features vulkan
        env:
          RUSTDOCFLAGS: "-D warnings"
